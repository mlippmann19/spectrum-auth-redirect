<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Spectrum Auth</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; background: #0f1117; font-family: system-ui, sans-serif;
           color: #6b7280; font-size: 13px; }
  </style>
</head>
<body>
  <span>Completing sign-in…</span>
  <script>
    // No MSAL here. Just read the auth code from the URL and hand it
    // back to the CRM window via postMessage, then close.
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const state  = params.get('state');
    const error  = params.get('error');

    if (code && window.opener) {
      window.opener.postMessage(
        { type: 'spectrum-oauth-code', code, returnedState: state },
        '*'
      );
    } else if (error && window.opener) {
      window.opener.postMessage(
        { type: 'spectrum-oauth-error', error },
        '*'
      );
    }

    // Close after a short delay so the postMessage is delivered
    setTimeout(() => window.close(), 300);
  </script>
</body>
</html>
